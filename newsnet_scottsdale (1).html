<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEWSNET CHANNEL 10</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Oswald', Arial, sans-serif;
    overflow: hidden;
  }

  #screen {
    position: relative;
    width: 100%; height: 100vh;
    background: #000;
  }


  /* ───────── PLAYER ───────── */
  #playerFrame {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
    z-index: 1;
  }

  /* ───────── OFFLINE SCREEN ───────── */
  /* ───────── WEATHER ALERT — FULL TAKEOVER (warnings/watches+) ───────── */
  #alertScreen {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 20000;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    text-align: left;
    padding: 0;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
  }

  #alertScreen.show { display: flex; }

  #alertScreen .alert-banner-top {
    background: #000;
    color: #fff;
    width: 100%;
    padding: 14px 24px;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 15px;
    letter-spacing: 2px;
    border-bottom: 3px solid #fff;
    text-transform: uppercase;
  }

  #alertScreen .alert-event {
    width: 100%;
    background: #c1121f;
    color: #fff;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 18px 24px;
    border-bottom: 3px solid #fff;
  }

  #alertScreen .alert-areas {
    width: 100%;
    font-size: 18px;
    color: #000;
    background: #fff;
    padding: 14px 24px;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #000;
  }

  #alertScreen .alert-desc {
    width: 100%;
    flex: 1;
    font-size: 16px;
    color: #fff;
    background: #000;
    padding: 24px;
    line-height: 1.6;
    overflow-y: auto;
    letter-spacing: 0.3px;
  }

  #alertScreen .alert-expires {
    width: 100%;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 13px;
    color: #000;
    background: #fff;
    padding: 10px 24px;
    letter-spacing: 1px;
    border-top: 1px solid #000;
  }

  /* ───────── WEATHER ADVISORY — BANNER OVERLAY ───────── */
  #advisoryBanner {
    display: none;
    position: fixed;
    bottom: 70px; left: 0; right: 0;
    z-index: 15000;
    background: rgba(0,0,0,0.92);
    border-top: 2px solid #c1121f;
    border-bottom: 2px solid #c1121f;
    color: #fff;
    padding: 10px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 1px;
    align-items: center;
    gap: 14px;
  }

  #advisoryBanner.show { display: flex; }

  #advisoryBanner .adv-tag {
    background: #c1121f;
    color: #fff;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 12px;
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  #advisoryBanner .adv-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #offlineScreen {
    display: none;
    position: absolute; inset: 0;
    background: #000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 5;
  }

  #offlineScreen .bars {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 22%;
    display: flex;
  }
  #offlineScreen .bars div { flex: 1; }

  #offlineScreen .msg {
    font-size: 28px;
    letter-spacing: 6px;
    color: #ccc;
    text-align: center;
  }

  #offlineScreen .submsg {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    margin-top: 10px;
  }

  #offlineScreen canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0.08;
  }

  /* ───────── STANDBY / FULL WEATHER SCREEN ───────── */
  #standbyScreen {
    display: none;
    position: absolute; inset: 0;
    background: radial-gradient(circle at top, #050608, #000000);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 5;
    gap: 14px;
  }

  #standbyScreen .net-id {
    font-size: 16px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 6px;
  }

  #standbyScreen .weather-emoji-big {
    font-size: 96px;
    line-height: 1;
  }

  #standbyScreen .weather-temp-big {
    font-size: 90px;
    font-weight: 700;
    color: #ddd;
    line-height: 1;
  }

  #standbyScreen .weather-desc-big {
    font-size: 26px;
    color: #6fa6c9;
    letter-spacing: 2px;
  }

  #standbyScreen .weather-details-big {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* Daily forecast strip on the overnight weather screen */
  #standbyForecast {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  #standbyForecast .fc-day {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    min-width: 70px;
  }

  #standbyForecast .fc-label {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  #standbyForecast .fc-emoji {
    font-size: 22px;
    margin: 2px 0;
  }

  #standbyForecast .fc-hi {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
  }

  #standbyForecast .fc-lo {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
  }

  /* Corner clock shown only on the full weather screen */
  #standbyCornerClock {
    position: absolute;
    top: 18px; left: 22px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 1px;
  }

  /* ───────── LOWER THIRD / BUG ───────── */
  #lowerThird {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    padding: 14px 20px;
    pointer-events: none;
  }

  #lowerThird .net-logo {
    background: #c1121f;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 2px;
    padding: 6px 14px;
    margin-right: 14px;
  }

  #lowerThird .segment-label {
    font-size: 15px;
    color: #fff;
    letter-spacing: 1px;
    flex: 1;
  }

  #lowerThird .clock-mini {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: #fff;
    margin-left: 14px;
  }

  #channelBug {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.55);
    z-index: 50;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="screen">

  <div id="playerFrame"></div>

  <div id="offlineScreen">
    <canvas id="offlineStatic"></canvas>
    <div class="bars" id="offlineBars"></div>
    <div class="msg">WE'LL BE RIGHT BACK</div>
    <div class="submsg">NEWSNET CHANNEL 10 IS OFF THE AIR · BROADCAST RESUMES AT 5:00 PM</div>
  </div>

  <div id="standbyScreen">
    <div id="standbyCornerClock">--:--</div>
    <div class="net-id">NEWSNET CHANNEL 10 · OVERNIGHT WEATHER</div>
    <div class="weather-emoji-big" id="standbyEmoji">🌙</div>
    <div class="weather-temp-big" id="standbyTemp">--°F</div>
    <div class="weather-desc-big" id="standbyDesc">LOADING</div>
    <div class="weather-details-big" id="standbyDetails">— · —</div>
    <div id="standbyForecast"></div>
  </div>

  <!-- FULL TAKEOVER WEATHER ALERT -->
  <div id="alertScreen">
    <div class="alert-banner-top">⚠ NATIONAL WEATHER SERVICE EMERGENCY ALERT ⚠</div>
    <div class="alert-event" id="alertEvent">TORNADO WARNING</div>
    <div class="alert-areas" id="alertAreas">— areas —</div>
    <div class="alert-desc" id="alertDesc">—</div>
    <div class="alert-expires" id="alertExpires">—</div>
  </div>

  <!-- ADVISORY BANNER (non-blocking) -->

  <div id="advisoryBanner">
    <div class="adv-tag">ADVISORY</div>
    <div class="adv-text" id="advisoryText">—</div>
  </div>

  <div id="channelBug">NEWSNET CHANNEL 10</div>

  <div id="lowerThird">
    <div class="net-logo" id="ntLogo">NEWSNET</div>
    <div class="segment-label" id="ntSegment">Loading schedule...</div>
    <div class="clock-mini" id="ntClock">--:--</div>
  </div>
</div>


<script>
/* ════════════════════════════════════════════
   CONFIG
   No RSS. No proxy. No queue. Just direct embeds —
   either a channel's live stream, or specific
   uploaded videos you give me, slotted by time.
════════════════════════════════════════════ */
const OWM_KEY = "69d758106d8333cb8e806b8d3bff6d15";
const LAT = 33.4942, LON = -111.9261; // Scottsdale, AZ

// NWS county code for Maricopa County, AZ — covers Scottsdale, Phoenix, Tempe, Mesa.
const NWS_ZONE = "AZC013";
const NWS_ALERT_CHECK_MS = 2 * 60 * 1000; // poll every 2 minutes

// Severities that get a full-screen takeover instead of a banner.
// Everything NOT in this set (e.g. "Advisory") is treated as banner-only.
const TAKEOVER_SEVERITIES = ["Warning", "Watch", "Emergency"];

// Official 24/7 live news streams — these auto-update themselves on YouTube's end,
// so there is nothing for you to maintain here.
const LIVE_STREAMS = {
  BBC:    "vtX1m5_wlzw",                 // BBC News Live (youtube.com/live/vtX1m5_wlzw)
  LOCAL2: "live_stream?channel=UCIVk1L1-JmpdiGuZcVjImtA" // ABC15 Arizona channel live slot
};

// Music video pool — single song per your request
const MUSIC_VIDEOS = [
  "8HwOwvLqcko"   // Freak 4 U — Hayden Henderson
  // "I Knew It" and "I Knew You" couldn't be verified as real MJ tracks —
  // skipped rather than guess wrong. Tell me the artist and I'll add them.
];

// Ad pools — shuffled once per page load so the order isn't identical every time
const NIGHT_ADS = ["GMUeLSUydrA", "hJ6cXcxUAAA"];
const DAY_ADS   = ["TUnx2o5FoYY"];

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffledNightAds = shuffleArray(NIGHT_ADS);
let shuffledDayAds   = shuffleArray(DAY_ADS);
let nightAdIdx = 0;
let dayAdIdx   = 0;

function nextNightAd() {
  if (nightAdIdx >= shuffledNightAds.length) {
    shuffledNightAds = shuffleArray(NIGHT_ADS);
    nightAdIdx = 0;
  }
  return shuffledNightAds[nightAdIdx++];
}

function nextDayAd() {
  if (dayAdIdx >= shuffledDayAds.length) {
    shuffledDayAds = shuffleArray(DAY_ADS);
    dayAdIdx = 0;
  }
  return shuffledDayAds[dayAdIdx++];
}

// Ads / filler video
const FILLER_AD_ID = "pQ2jtyVKWhc";

/* ════════════════════════════════════════════
   YOUR SPECIFIC NEWSCAST VIDEOS
   Paste exact video IDs here, mapped to the hour
   they aired/should air. "today" plays today,
   "tomorrow" auto-plays the next day at the same
   time — so you only have to enter each video once
   and it correctly repeats one day later.
   Format: hour (0-23) -> YouTube video ID
════════════════════════════════════════════ */
const SCHEDULED_VIDEOS = {
  // Hour : videoId  (24-hour clock)
  // Add specific newscast video IDs here if you have them, e.g.:
  // 7:  "xxxxxxxxxxx",
  // 18: "xxxxxxxxxxx",
};

/* ════════════════════════════════════════════
   SCHEDULE DEFINITION
════════════════════════════════════════════ */
function M(h, m=0) { return h * 60 + m; }

const SCHEDULE = [
  { start: M(0),  end: M(17), type: "offline",           label: "OFF AIR" },
  { start: M(17), end: M(18), type: "scheduled_or_local", label: "EVENING PREVIEW · WEATHER & TRAFFIC" },
  { start: M(18), end: M(19), type: "scheduled_or_local", label: "12 NEWS EVENING NEWS" },
  { start: M(19), end: M(20), type: "scheduled_or_local", label: "EXTENDED COVERAGE" },
  { start: M(20), end: M(21), type: "scheduled_or_local", label: "NEWS RECAP" },
  { start: M(21), end: M(22), type: "scheduled_or_local", label: "LATE NEWS" },
  { start: M(22), end: M(24), type: "music",             label: "MUSIC VIDEOS" },
];

function getSlot(minutes) {
  for (const s of SCHEDULE) {
    if (minutes >= s.start && minutes < s.end) return s;
  }
  return SCHEDULE[0];
}

/* ════════════════════════════════════════════
   TIME ENGINE (real time only)
════════════════════════════════════════════ */
function nowMinutes() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function currentHour() {
  return Math.floor(nowMinutes() / 60);
}

function fmtTime(mins) {
  let h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  const ampm = h >= 12 ? "PM" : "AM";
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

/* ════════════════════════════════════════════
   YOUTUBE IFRAME API — lets us detect when a video
   actually ENDS (for music) instead of guessing a timer.
════════════════════════════════════════════ */
let ytPlayer = null;
let ytReady = false;
let pendingPlay = null; // {videoId, opts} queued if API isn't ready yet
let onMusicEndedCallback = null; // set while a music video is playing

function loadYouTubeAPI() {
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('playerFrame', {
    height: '100%',
    width: '100%',
    playerVars: { autoplay: 1, controls: 1, modestbranding: 1, rel: 0 },
    events: {
      onReady: () => { ytReady = true; if (pendingPlay) { const p = pendingPlay; pendingPlay = null; playYouTube(p.videoId, p.opts); } },
      onStateChange: onPlayerStateChange
    }
  });
};

function onPlayerStateChange(e) {
  // 0 = ended
  if (e.data === 0 && onMusicEndedCallback) {
    const cb = onMusicEndedCallback;
    onMusicEndedCallback = null;
    cb();
  }
}

/* ════════════════════════════════════════════
   PLAYER CONTROL
════════════════════════════════════════════ */
function playYouTube(videoId, opts = {}) {
  document.getElementById("offlineScreen").style.display = "none";
  document.getElementById("standbyScreen").style.display = "none";

  if (!ytReady || !ytPlayer || !ytPlayer.loadVideoById) {
    pendingPlay = { videoId, opts };
    return;
  }
  ytPlayer.loadVideoById(videoId);
  document.getElementById("playerFrame").style.display = "block";
}

// Embeds a channel's live stream directly — auto-resolves to whatever is
// currently live on that channel, no video ID needed, self-updating forever.
function playChannelLive(channelId, opts = {}) {
  document.getElementById("offlineScreen").style.display = "none";
  document.getElementById("standbyScreen").style.display = "none";
  if (!ytReady || !ytPlayer) {
    pendingPlay = { liveChannelId: channelId, opts };
    return;
  }
  ytPlayer.cueVideoById ? null : null; // no-op, live streams handled via loadPlaylist fallback below
  // Live channel streams aren't loadable by ID directly through the JS API in all cases,
  // so we fall back to swapping the underlying iframe src for this one case only.
  const params = new URLSearchParams({ autoplay: "1", controls: opts.controls ?? "1", modestbranding: "1" });
  document.getElementById("playerFrame").src = `https://www.youtube.com/embed/live_stream?channel=${channelId}&${params.toString()}`;
  document.getElementById("playerFrame").style.display = "block";
}

function stopPlayer() {
  if (ytPlayer && ytPlayer.stopVideo) {
    try { ytPlayer.stopVideo(); } catch(e) {}
  }
  document.getElementById("playerFrame").style.display = "none";
}

function showOffline() {
  stopPlayer();
  document.getElementById("offlineScreen").style.display = "flex";
  document.getElementById("standbyScreen").style.display = "none";
}

function showStandby() {
  stopPlayer();
  document.getElementById("offlineScreen").style.display = "none";
  document.getElementById("standbyScreen").style.display = "flex";
}

/* ════════════════════════════════════════════
   OVERNIGHT CYCLE — alternates: night ad, then full weather
   screen with corner clock, then repeats.
════════════════════════════════════════════ */
let overnightTimer = null;
let overnightShowingAd = true; // starts with an ad first

function runOvernightCycle() {
  clearTimeout(overnightTimer);

  if (overnightShowingAd) {
    document.getElementById("ntLogo").innerText = "ADS";
    document.getElementById("ntSegment").innerText = "Commercial break";
    playYouTube(nextNightAd(), { controls: "0" });
    document.getElementById("standbyScreen").style.display = "none";
    // After the ad's rough runtime, switch to the full weather screen
    overnightTimer = setTimeout(() => {
      overnightShowingAd = false;
      runOvernightCycle();
    }, 60 * 1000); // ~60s per ad slot; adjust if your ads run longer
  } else {
    document.getElementById("ntLogo").innerText = "NEWSNET";
    document.getElementById("ntSegment").innerText = "Overnight Weather";
    stopPlayer();
    showStandby();
    loadOvernightWeather();
    overnightTimer = setTimeout(() => {
      overnightShowingAd = true;
      runOvernightCycle();
    }, 90 * 1000); // full weather screen shown for 90s, then back to an ad
  }
}

/* ════════════════════════════════════════════
   MUSIC ROTATION — advances only when the current
   song actually ENDS, not on a guessed timer.
════════════════════════════════════════════ */
let musicIdx = Math.floor(Math.random() * MUSIC_VIDEOS.length);

function playNextMusic() {
  musicIdx = (musicIdx + 1) % MUSIC_VIDEOS.length;
  playYouTube(MUSIC_VIDEOS[musicIdx]);
  onMusicEndedCallback = () => {
    // Only keep chaining if we're still actually in a music slot
    if (currentSlotKey && currentSlotKey.includes("music")) playNextMusic();
  };
}

/* ════════════════════════════════════════════
   CORE SCHEDULE EVALUATOR
════════════════════════════════════════════ */
const LOCAL2_CHANNEL_ID = "UCIVk1L1-JmpdiGuZcVjImtA"; // ABC15 Arizona
const BBC_LIVE_VIDEO_ID = "vtX1m5_wlzw";

let currentSlotKey = null;

function evaluateSchedule(force = false) {
  const mins = nowMinutes();
  const slot = getSlot(mins);
  const slotKey = `${slot.start}-${slot.end}-${slot.type}-${currentHour()}`;

  document.getElementById("ntClock").innerText = fmtTime(mins);

  if (slotKey === currentSlotKey && !force) return;
  currentSlotKey = slotKey;
  onMusicEndedCallback = null; // stop any pending music chain when switching content types
  clearTimeout(overnightTimer);

  document.getElementById("ntSegment").innerText = slot.label;

  switch (slot.type) {
    case "offline":
      document.getElementById("ntLogo").innerText = "OFF AIR";
      showOffline();
      break;

    case "overnight_calm":
      overnightShowingAd = true; // always start the cycle with an ad on entry
      runOvernightCycle();
      break;

    case "music":
      document.getElementById("ntLogo").innerText = "MUSIC";
      playNextMusic();
      break;

    case "bbc_live":
      document.getElementById("ntLogo").innerText = "BBC";
      playYouTube(BBC_LIVE_VIDEO_ID);
      break;

    case "scheduled_or_local":
      // If you gave me a specific video for this exact hour, play it (works today AND tomorrow
      // automatically since we key off hour-of-day, not a specific date).
      // Otherwise fall back to ABC15 Arizona's live stream so the slot is never empty.
      const hour = Math.floor(mins / 60);
      if (SCHEDULED_VIDEOS[hour]) {
        document.getElementById("ntLogo").innerText = "12 NEWS";
        playYouTube(SCHEDULED_VIDEOS[hour]);
      } else {
        document.getElementById("ntLogo").innerText = "ABC15";
        playChannelLive(LOCAL2_CHANNEL_ID);
      }
      break;

    default:
      playYouTube(FILLER_AD_ID, { controls: "0" });
  }
}

/* ════════════════════════════════════════════
   WEATHER (overnight full weather screen)
════════════════════════════════════════════ */
function weatherEmojiFor(main) {
  if (!main) return "🌙";
  if (main.includes("Cloud")) return "☁️";
  if (main.includes("Rain"))  return "🌧️";
  if (main.includes("Thunder")) return "⛈️";
  if (main.includes("Clear")) return "🌙";
  if (main.includes("Snow"))  return "❄️";
  return "🌙";
}

async function loadOvernightWeather() {
  try {
    const [curRes, fcRes] = await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=imperial&appid=${OWM_KEY}`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${LAT}&lon=${LON}&units=imperial&appid=${OWM_KEY}`)
    ]);
    const d  = await curRes.json();
    const fc = await fcRes.json();

    const set = (id, v) => { const el = document.getElementById(id); if (el) el.innerText = v; };
    set("standbyEmoji",  weatherEmojiFor(d.weather[0].main));
    set("standbyTemp",   `${Math.round(d.main.temp)}°F`);
    set("standbyDesc",   d.weather[0].main.toUpperCase());
    set("standbyDetails",`Feels ${Math.round(d.main.feels_like)}°F · Humidity ${d.main.humidity}% · Wind ${Math.round(d.wind.speed)} mph`);

    // Build a simple 5-day forecast from the 3-hour-interval data
    const days = {};
    for (const item of fc.list) {
      const dt = new Date(item.dt * 1000);
      const key = dt.toDateString();
      if (!days[key]) days[key] = { highs: [], lows: [], conditions: [] };
      days[key].highs.push(item.main.temp_max);
      days[key].lows.push(item.main.temp_min);
      days[key].conditions.push(item.weather[0].main);
    }
    const dayKeys = Object.keys(days).slice(0, 5);
    const strip = document.getElementById("standbyForecast");
    if (strip) {
      strip.innerHTML = dayKeys.map(k => {
        const day = days[k];
        const hi  = Math.round(Math.max(...day.highs));
        const lo  = Math.round(Math.min(...day.lows));
        const emoji = weatherEmojiFor(day.conditions[Math.floor(day.conditions.length / 2)]);
        const label = new Date(k).toLocaleDateString("en-US", { weekday: "short" });
        return `
          <div class="fc-day">
            <div class="fc-label">${label}</div>
            <div class="fc-emoji">${emoji}</div>
            <div class="fc-hi">${hi}°</div>
            <div class="fc-lo">${lo}°</div>
          </div>`;
      }).join("");
    }
  } catch (e) {
    const el = document.getElementById("standbyDesc");
    if (el) el.innerText = "WEATHER UNAVAILABLE";
  }
}

/* ════════════════════════════════════════════
   NWS WEATHER ALERTS — Maricopa County, AZ
   Polls the free public NWS API. Advisories get a
   non-blocking banner; anything more severe (Watch,
   Warning, Emergency) takes over the full screen,
   pauses whatever's playing, and restores it after
   the alert's own expiration time.
════════════════════════════════════════════ */
let activeAlertIds = new Set();
let takeoverActive = false;
let preAlertSlotKey = null; // remembers what was playing so we can resume it

function classifyAlert(severity, event) {
  // NWS "severity" field is one of: Extreme, Severe, Moderate, Minor, Unknown.
  // We instead key off the event's own naming convention, since "Tornado Warning",
  // "Flood Watch", "Heat Advisory" etc. tell us directly what tier it is.
  const lower = (event || "").toLowerCase();
  if (lower.includes("emergency")) return "Emergency";
  if (lower.includes("warning"))   return "Warning";
  if (lower.includes("watch"))     return "Watch";
  return "Advisory"; // covers Advisory, Statement, Outlook, Special Weather Statement, etc.
}

// NWS doesn't reliably send CORS headers for browser fetches, so route through
// a couple of free proxies that add them — automatic fallback, nothing to set up.
const NWS_PROXIES = [
  (url) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  (url) => "https://corsproxy.io/?url=" + encodeURIComponent(url),
  (url) => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url)
];

async function fetchNWSAlerts() {
  const targetUrl = `https://api.weather.gov/alerts/active?zone=${NWS_ZONE}`;
  for (const buildProxyUrl of NWS_PROXIES) {
    try {
      const res = await fetch(buildProxyUrl(targetUrl));
      if (!res.ok) continue;
      const data = await res.json();
      if (data && data.features) return data;
    } catch (e) {
      // try next proxy
    }
  }
  throw new Error("All NWS proxies failed");
}

let takeoverExpiryTimer = null;

function scheduleAutoExpire(props) {
  clearTimeout(takeoverExpiryTimer);
  if (!props.expires) return; // no expiry given — relies on NWS dropping it from the feed
  const msUntilExpiry = new Date(props.expires).getTime() - Date.now();
  if (msUntilExpiry <= 0) return; // already expired somehow — let normal flow clear it
  takeoverExpiryTimer = setTimeout(() => {
    if (takeoverActive) restoreFromTakeover();
  }, msUntilExpiry);
}

async function checkNWSAlerts() {
  try {
    const data = await fetchNWSAlerts();
    const features = data.features || [];

    // Drop anything already past its own expiry time, even if NWS is still listing it
    const now = Date.now();
    const live = features.filter(f => {
      const exp = f.properties.expires;
      return !exp || new Date(exp).getTime() > now;
    });

    if (live.length === 0) {
      clearAllAlerts();
      return;
    }

    // Rank: Emergency > Warning > Watch > Advisory — always surface the worst active one
    const rank = { "Emergency": 3, "Warning": 2, "Watch": 1, "Advisory": 0 };
    let worst = null;

    for (const f of live) {
      const p = f.properties;
      const tier = classifyAlert(p.severity, p.event);
      if (!worst || rank[tier] > rank[worst.tier]) {
        worst = { tier, props: p };
      }
    }

    if (TAKEOVER_SEVERITIES.includes(worst.tier)) {
      showAlertTakeover(worst.props, worst.tier);
    } else {
      showAdvisoryBanner(worst.props);
    }
  } catch (e) {
    console.warn("NWS alert check failed:", e);
  }
}

function clearAllAlerts() {
  document.getElementById("advisoryBanner").classList.remove("show");
  clearTimeout(takeoverExpiryTimer);
  if (takeoverActive) restoreFromTakeover();
}

let advisoryToneAlertIds = new Set();

function showAdvisoryBanner(props) {
  // Don't show a banner if we're already in a full takeover for something worse
  if (takeoverActive) return;
  const el = document.getElementById("advisoryBanner");
  document.getElementById("advisoryText").innerText =
    `${props.event.toUpperCase()} — ${props.areaDesc} — ${props.headline || props.event}`;
  el.classList.add("show");

  // Brief tone, and only the first time we see this specific advisory — not on every poll
  const alertId = props.id || (props.event + props.areaDesc);
  if (!advisoryToneAlertIds.has(alertId)) {
    advisoryToneAlertIds.add(alertId);
    playAlertTone(2.5); // short tone for advisories
  }
}

let alertToneAudio = null;
function playAlertTone(durationSeconds = 8) {
  // Synthesized EAS-style attention tone — generated fresh via Web Audio API,
  // not a recording of any broadcast. Real EAS plays 853Hz + 960Hz simultaneously
  // (not back-to-back), so both oscillators run together for the duration.
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const makeTone = (freq) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = "square";
      gain.gain.value = 0.12;
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + durationSeconds);
      return osc;
    };
    makeTone(853);
    makeTone(960);
  } catch (e) {
    console.warn("Alert tone failed:", e);
  }
}

function showAlertTakeover(props, tier) {
  const alertId = props.id || (props.event + props.areaDesc);
  const isNewAlert = !activeAlertIds.has(alertId);

  document.getElementById("advisoryBanner").classList.remove("show");

  if (!takeoverActive) {
    preAlertSlotKey = currentSlotKey; // remember what to resume later
    stopPlayer();
    clearTimeout(overnightTimer);
    onMusicEndedCallback = null;
    startTakeoverToneLoop(); // sound plays continuously while the takeover is up
  }

  takeoverActive = true;
  activeAlertIds.add(alertId);

  document.getElementById("alertEvent").innerText = props.event.toUpperCase();
  document.getElementById("alertAreas").innerText = props.areaDesc;
  document.getElementById("alertDesc").innerText = props.description
    ? props.description.slice(0, 600)
    : (props.headline || "Take appropriate action immediately.");
  const exp = props.expires ? new Date(props.expires) : null;
  document.getElementById("alertExpires").innerText = exp
    ? `IN EFFECT UNTIL ${exp.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`
    : "IN EFFECT UNTIL FURTHER NOTICE";

  document.getElementById("alertScreen").classList.add("show");
  document.getElementById("offlineScreen").style.display = "none";
  document.getElementById("standbyScreen").style.display = "none";

  // Always (re)schedule the auto-expiry here, not in the caller — this guarantees
  // both real NWS alerts AND test-panel alerts actually end on their own.
  scheduleAutoExpire(props);

  if (isNewAlert) {
    // Speak the alert once it first appears, timed to start just after the tone burst
    setTimeout(() => speakAlert(props), 8200);
  }
}

/* ════════════════════════════════════════════
   CREEPY DIGITAL VOICE READOUT
   Uses the browser's built-in speech synthesis,
   detuned to sound flat, robotic, and unsettling
   rather than like a normal assistant voice.
════════════════════════════════════════════ */
function speakAlert(props) {
  if (!('speechSynthesis' in window)) return;

  const text =
    `Attention. The National Weather Service has issued a ${props.event} ` +
    `for the following areas: ${props.areaDesc}. ` +
    `${props.headline || ""} ` +
    `Take appropriate action immediately. This is not a test.`;

  const utter = new SpeechSynthesisUtterance(text);
  // Low pitch + slightly slow, flat rate gives a cold, synthetic, unsettling tone
  // rather than a natural conversational voice.
  utter.pitch = 0.3;
  utter.rate = 0.85;
  utter.volume = 1;

  // Prefer a lower-register or more robotic-sounding system voice if one is available
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => /male|david|fred|alex|daniel/i.test(v.name)) || voices[0];
  if (preferred) utter.voice = preferred;

  window.speechSynthesis.cancel(); // clear any queued speech first
  window.speechSynthesis.speak(utter);
}

function stopAlertVoice() {
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
}

let takeoverToneInterval = null;

function startTakeoverToneLoop() {
  playAlertTone(8); // initial long tone burst
  clearInterval(takeoverToneInterval);
  // Re-trigger every 9s so the tone effectively plays continuously while the
  // takeover screen is active, with a brief natural gap between bursts.
  takeoverToneInterval = setInterval(() => {
    if (takeoverActive) playAlertTone(8);
  }, 9000);
}

function stopTakeoverToneLoop() {
  clearInterval(takeoverToneInterval);
  takeoverToneInterval = null;
}

function restoreFromTakeover() {
  takeoverActive = false;
  stopTakeoverToneLoop();
  stopAlertVoice();
  clearTimeout(takeoverExpiryTimer);
  document.getElementById("alertScreen").classList.remove("show");
  activeAlertIds.clear();
  currentSlotKey = null; // force evaluateSchedule to rebuild whatever should be playing now
  evaluateSchedule(true);
}


setInterval(checkNWSAlerts, NWS_ALERT_CHECK_MS);
checkNWSAlerts();

setInterval(() => evaluateSchedule(), 30 * 1000);
loadOvernightWeather();
loadYouTubeAPI();
evaluateSchedule(true);

</script>
